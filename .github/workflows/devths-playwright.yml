name: Devths-FE E2E 파이프라인
on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL for E2E tests'
        required: true
        default: 'https://stg.devths.com'
        type: string
  workflow_call:
    inputs:
      target_url:
        required: true
        type: string
    secrets:
      DISCORD_WEBHOOK_URL:
        required: true
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: pnpm 설치
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 노드 JS 설치
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: Playwright 브라우저 캐시 확인
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Playwright 브라우저 설치
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps

      - name: Playwright 시스템 의존성만 설치 (캐시 히트 시)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps
      - name: Run Playwright tests
        id: playwright
        continue-on-error: true
        env:
          BASE_URL: ${{ inputs.target_url || 'https://stg.devths.com' }}
          PLAYWRIGHT_JSON_OUTPUT_NAME: result.json
        run: pnpm exec playwright test --reporter=html,json

      - name: Parse Test Results
        id: results
        if: always()
        run: |
          if [ ! -f result.json ]; then
            echo "❌ result.json 파일이 생성되지 않았습니다."
            echo "total=0" >> $GITHUB_OUTPUT
            echo "passed=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
            echo "skipped=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          # JSON 유효성 검사
          if ! jq empty result.json 2>/dev/null; then
            echo "❌ result.json 파일이 유효한 JSON이 아닙니다."
            echo "파일 내용:"
            cat result.json || echo "파일을 읽을 수 없습니다."
            echo "total=0" >> $GITHUB_OUTPUT
            echo "passed=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
            echo "skipped=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 통계 추출 (null 체크 포함)
          TOTAL=$(jq '.stats.expected // 0' result.json)
          UNEXPECTED=$(jq '.stats.unexpected // 0' result.json)
          SKIPPED=$(jq '.stats.skipped // 0' result.json)
          PASSED=$((TOTAL - UNEXPECTED - SKIPPED))

          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$UNEXPECTED" >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT

          echo "📊 테스트 결과: 전체 $TOTAL, 성공 $PASSED, 실패 $UNEXPECTED, 스킵 $SKIPPED"

      - name: HTML 리포트 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Discord 알림 전송
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "🎭 E2E Test 결과 [${{ job.status == 'success' && '✅성공' || '❌실패' }}]"
          description: |
            **대상 URL**: ${{ inputs.target_url }}
            **실행자**: ${{ github.actor }}

            📊 **테스트 요약**
            - ✅ 성공: ${{ steps.results.outputs.passed }}
            - ❌ 실패: ${{ steps.results.outputs.failed }}
            - ⏭️ 건너뜀: ${{ steps.results.outputs.skipped }}
            (총 ${{ steps.results.outputs.total }}개 케이스)

            **🔗 링크**: [결과 리포트 확인하기](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          color: "${{ job.status == 'success' && 65280 || 16711680 }}"
          username: Playwright E2E Bot
          avatar_url: https://playwright.dev/img/playwright-logo.svg
